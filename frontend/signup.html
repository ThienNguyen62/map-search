<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Munich Tàu Điện Ngầm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #1f2937;
            padding: 20px;
        }

        .signup-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .signup-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .signup-header h1 {
            font-size: 28px;
            color: #667eea;
            margin-bottom: 10px;
        }

        .signup-header p {
            color: #6b7280;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="tel"],
        select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .terms-group {
            display: flex;
            align-items: flex-start;
            margin-bottom: 25px;
            font-size: 13px;
        }

        .terms-group input[type="checkbox"] {
            margin-right: 8px;
            margin-top: 2px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .terms-group label {
            margin: 0;
            color: #6b7280;
            line-height: 1.5;
        }

        .terms-group a {
            color: #667eea;
            text-decoration: none;
        }

        .terms-group a:hover {
            text-decoration: underline;
        }

        .signup-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-bottom: 15px;
        }

        .signup-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .signup-btn:active {
            transform: translateY(0);
        }

        .login-link {
            text-align: center;
            color: #6b7280;
            font-size: 14px;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
            cursor: pointer;
        }

        .login-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .error-message {
            background-color: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            border-left: 4px solid #dc2626;
        }

        .error-message.show {
            display: block;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .success-message {
            background-color: #dcfce7;
            color: #166534;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            border-left: 4px solid #22c55e;
        }

        .success-message.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 14px;
        }

        .loading.show {
            display: block;
        }

        .password-strength {
            display: none;
            margin-top: 8px;
            padding: 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .password-strength.show {
            display: block;
        }

        .strength-weak {
            background-color: #fee2e2;
            color: #991b1b;
        }

        .strength-medium {
            background-color: #fef3c7;
            color: #92400e;
        }

        .strength-strong {
            background-color: #dcfce7;
            color: #166534;
        }
    </style>
</head>

<body>
    <div class="signup-container">
        <!-- Header -->
        <div class="signup-header">
            <h1>Tạo Tài Khoản</h1>
            <p>Đăng ký để sử dụng Munich Metro</p>
        </div>

        <!-- Messages -->
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <!-- Form -->
        <form id="signupForm">
            <!-- Name fields -->
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">Họ</label>
                    <input 
                        type="text" 
                        id="firstName" 
                        name="firstName" 
                        placeholder="Nhập họ của bạn" 
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="lastName">Tên</label>
                    <input 
                        type="text" 
                        id="lastName" 
                        name="lastName" 
                        placeholder="Nhập tên của bạn" 
                        required
                    >
                </div>
            </div>

            <!-- Username -->
            <div class="form-group">
                <label for="username">Tên người dùng</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Chọn tên người dùng" 
                    required
                >
                <small style="color: #9ca3af; margin-top: 4px; display: block;">
                    Tối thiểu 3 ký tự, chỉ chứa chữ cái, số và dấu gạch dưới
                </small>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="Nhập địa chỉ email" 
                    required
                >
            </div>

            <!-- Phone (Optional) -->
            <div class="form-group">
                <label for="phone">Số điện thoại (tùy chọn)</label>
                <input 
                    type="tel" 
                    id="phone" 
                    name="phone" 
                    placeholder="Nhập số điện thoại"
                >
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Tối thiểu 8 ký tự" 
                    required
                >
                <div class="password-strength" id="passwordStrength"></div>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
                <label for="confirmPassword">Xác nhận mật khẩu</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    name="confirmPassword" 
                    placeholder="Nhập lại mật khẩu" 
                    required
                >
            </div>

            <!-- Terms and Conditions -->
            <div class="terms-group">
                <input type="checkbox" id="agreeTerms" name="agreeTerms" required>
                <label for="agreeTerms">
                    Tôi đồng ý với <a href="#" onclick="alert('Điều khoản dịch vụ'); return false;">Điều khoản dịch vụ</a> 
                    và <a href="#" onclick="alert('Chính sách bảo mật'); return false;">Chính sách bảo mật</a>
                </label>
            </div>

            <!-- Loading indicator -->
            <div class="loading" id="loading">
                <span>Đang xử lý...</span>
            </div>

            <!-- Submit button -->
            <button type="submit" class="signup-btn">Đăng Ký</button>
        </form>

        <!-- Login link -->
        <div class="login-link">
            Đã có tài khoản? <a href="login.html">Đăng nhập tại đây</a>
        </div>
    </div>

    <script>
        // Handle form submission
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            handleSignUp();
        });

        // Password strength checker
        document.getElementById('password').addEventListener('input', function() {
            checkPasswordStrength(this.value);
        });

        function checkPasswordStrength(password) {
            const strengthDiv = document.getElementById('passwordStrength');
            
            if (password.length === 0) {
                strengthDiv.classList.remove('show');
                return;
            }

            let strength = 0;
            
            // Length check
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            
            // Character variety check
            if (/[a-z]/.test(password)) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            strengthDiv.classList.add('show');
            
            if (strength < 3) {
                strengthDiv.textContent = '🔴 Mật khẩu yếu';
                strengthDiv.className = 'password-strength show strength-weak';
            } else if (strength < 5) {
                strengthDiv.textContent = '🟡 Mật khẩu trung bình';
                strengthDiv.className = 'password-strength show strength-medium';
            } else {
                strengthDiv.textContent = '🟢 Mật khẩu mạnh';
                strengthDiv.className = 'password-strength show strength-strong';
            }
        }

        function handleSignUp() {
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const agreeTerms = document.getElementById('agreeTerms').checked;

            // Clear messages
            clearMessages();

            // Validation
            if (!firstName) {
                showError('Vui lòng nhập họ');
                return;
            }

            if (!lastName) {
                showError('Vui lòng nhập tên');
                return;
            }

            if (!username || username.length < 3) {
                showError('Tên người dùng phải có ít nhất 3 ký tự');
                return;
            }

            if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                showError('Tên người dùng chỉ được chứa chữ cái, số và dấu gạch dưới');
                return;
            }

            if (!email || !isValidEmail(email)) {
                showError('Vui lòng nhập email hợp lệ');
                return;
            }

            if (!password || password.length < 8) {
                showError('Mật khẩu phải có ít nhất 8 ký tự');
                return;
            }

            if (password !== confirmPassword) {
                showError('Mật khẩu xác nhận không khớp');
                return;
            }

            if (!agreeTerms) {
                showError('Vui lòng đồng ý với Điều khoản dịch vụ');
                return;
            }

            showLoading(true);

            fetch('http://127.0.0.1:5000/api/auth/signup', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    first_name: firstName,
                    last_name: lastName,
                    username: username,
                    email: email,
                    phone: phone,
                    password: password
                })
            })
                .then(async response => {
                    const data = await response.json();
                    showLoading(false);
                    if (!response.ok) {
                        showError(data.error || 'Đăng ký thất bại');
                        return;
                    }
                    showSuccess('Đăng ký thành công! Đang chuyển hướng tới đăng nhập...');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                })
                .catch(() => {
                    showLoading(false);
                    showError('Không thể kết nối tới server. Hãy kiểm tra backend.');
                });
        }

        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            window.scrollTo(0, 0);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.classList.add('show');
        }

        function clearMessages() {
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
        }

        function showLoading(show) {
            const loading = document.getElementById('loading');
            const button = document.querySelector('.signup-btn');
            
            if (show) {
                loading.classList.add('show');
                button.disabled = true;
            } else {
                loading.classList.remove('show');
                button.disabled = false;
            }
        }
    </script>
</body>

</html>
