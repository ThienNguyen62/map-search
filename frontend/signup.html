<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Ký - Munich Tàu Điện Ngầm</title>
    <link rel="stylesheet" href="signup.css" />
  </head>

  <body>
    <div class="signup-container">
      <!-- Header -->
      <div class="signup-header">
        <h1>Tạo Tài Khoản</h1>
        <p>Đăng ký để sử dụng Munich Metro</p>
      </div>

      <!-- Messages -->
      <div class="error-message" id="errorMessage"></div>
      <div class="success-message" id="successMessage"></div>

      <!-- Form -->
      <form id="signupForm">
        <!-- Name fields -->
        <div class="form-row">
          <div class="form-group">
            <label for="firstName">Họ</label>
            <input
              type="text"
              id="firstName"
              name="firstName"
              placeholder="Nhập họ của bạn"
              required
            />
          </div>
          <div class="form-group">
            <label for="lastName">Tên</label>
            <input
              type="text"
              id="lastName"
              name="lastName"
              placeholder="Nhập tên của bạn"
              required
            />
          </div>
        </div>

        <!-- Username -->
        <div class="form-group">
          <label for="username">Tên người dùng</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Chọn tên người dùng"
            required
          />
          <small style="color: #9ca3af; margin-top: 4px; display: block">
            Tối thiểu 3 ký tự, chỉ chứa chữ cái, số và dấu gạch dưới
          </small>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Nhập địa chỉ email"
            required
          />
        </div>

        <!-- Phone (Optional) -->
        <div class="form-group">
          <label for="phone">Số điện thoại (tùy chọn)</label>
          <input
            type="tel"
            id="phone"
            name="phone"
            placeholder="Nhập số điện thoại"
          />
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Tối thiểu 8 ký tự"
            required
          />
          <div class="password-strength" id="passwordStrength"></div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label for="confirmPassword">Xác nhận mật khẩu</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="Nhập lại mật khẩu"
            required
          />
        </div>

        <!-- Terms and Conditions -->
        <div class="terms-group">
          <input type="checkbox" id="agreeTerms" name="agreeTerms" required />
          <label for="agreeTerms">
            Tôi đồng ý với
            <a
              href="#"
              onclick="
                alert('Điều khoản dịch vụ');
                return false;
              "
              >Điều khoản dịch vụ</a
            >
            và
            <a
              href="#"
              onclick="
                alert('Chính sách bảo mật');
                return false;
              "
              >Chính sách bảo mật</a
            >
          </label>
        </div>

        <!-- Loading indicator -->
        <div class="loading" id="loading">
          <span>Đang xử lý...</span>
        </div>

        <!-- Submit button -->
        <button type="submit" class="signup-btn">Đăng Ký</button>
      </form>

      <!-- Login link -->
      <div class="login-link">
        Đã có tài khoản? <a href="login.html">Đăng nhập tại đây</a>
      </div>
    </div>

    <script src="signup.js"></script>
  </body>
</html>
