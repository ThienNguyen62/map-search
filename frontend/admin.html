<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - Munich Metro</title>
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <div class="admin-layout">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>Metro Admin</h2>
        </div>
        <nav class="sidebar-nav">
          <ul>
            <li class="active">
              <a href="#" onclick="showSection('overview')">📊 Tổng quan</a>
            </li>
            <li>
              <a href="#" onclick="showSection('stations')"
                >🚉 Quản lý ga tàu</a
              >
            </li>
            <li>
              <a href="#" onclick="showSection('routes')"
                >🛣️ Quản lý tuyến đường</a
              >
            </li>
            <li>
              <a href="#" onclick="showSection('users')">👥 Người dùng</a>
            </li>
          </ul>
        </nav>
        <div class="sidebar-footer">
          <button class="logout-btn" onclick="handleLogout()">
            🚪 Đăng xuất
          </button>
        </div>
      </aside>

      <main class="main-content">
        <header class="top-bar">
          <h1 id="section-title">Tổng quan hệ thống</h1>
          <div class="admin-profile">
            <span id="admin-name">Xin chào, Admin</span>
          </div>
        </header>

        <section id="content-area" class="content-area">
          <div class="stats-grid">
            <div class="stat-card">
              <h3>Tổng ga tàu</h3>
              <p class="stat-number">150</p>
            </div>
            <div class="stat-card">
              <h3>Tuyến đang chạy</h3>
              <p class="stat-number">8</p>
            </div>
            <div class="stat-card">
              <h3>Người dùng mới</h3>
              <p class="stat-number">+12</p>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="admin.js"></script>
  </body>
</html>
